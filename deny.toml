# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
version = 2
# Ignore specific advisories that are not actionable
ignore = [
    # bincode 1.3.3 is unmaintained but functional
    "RUSTSEC-2025-0141",
    # lru 0.12.5 IterMut soundness - not in our code paths
    "RUSTSEC-2026-0002",
    # number_prefix unmaintained - dependency of indicatif
    "RUSTSEC-2025-0119",
    # git2 Buf UB - not in our code paths
    "RUSTSEC-2026-0008",
    # rand unsoundness with custom logger - not in our code paths
    "RUSTSEC-2026-0097",
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "OFL-1.1",
    "GPL-3.0-only",
    "GPL-3.0",
    "Zlib",
    "BSL-1.0",
    "Apache-2.0 WITH LLVM-exception",
]
exceptions = [
    { allow = ["OpenSSL"], name = "ring", version = "*" },
    { allow = ["OpenSSL"], name = "openssl-sys", version = "*" },
]

[[licenses.clarify]]
name = "ring"
version = "*"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 },
]

[bans]
# Multiple versions of the same crate are allowed by default
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-git = []
