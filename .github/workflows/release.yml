name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  # Create GitHub release and publish to crates.io
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    
    - name: Build release binary
      run: cargo build --release
    
    - name: Create tarball
      run: |
        mkdir -p release
        cp target/release/magellan release/
        tar -czf magellan-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz -C release magellan
    
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: magellan-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
        generate_release_notes: true
        draft: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Publish to crates.io
      run: cargo publish
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
